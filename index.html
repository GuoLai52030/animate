<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>序列帧动画工具 - 专业增强版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .main-content {
            padding: 30px;
        }

        .section {
            margin-bottom: 30px;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 12px;
            border: 2px dashed #dee2e6;
        }

        .section-title {
            font-size: 20px;
            font-weight: 600;
            color: #495057;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            width: 4px;
            height: 24px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 2px;
        }

        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            background: white;
            cursor: pointer;
            transition: all 0.3s;
        }

        .upload-area:hover { background: #f8f9ff; }

        input[type="file"] { display: none; }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        label { font-weight: 600; font-size: 14px; }

        input[type="number"], input[type="range"], select {
            padding: 10px;
            border: 2px solid #dee2e6;
            border-radius: 8px;
        }

        button {
            padding: 12px 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }

        button:disabled { background: #adb5bd; cursor: not-allowed; }

        /* --- 预览网格与放大功能样式 --- */
        .frames-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }

        .frame-item {
            position: relative;
            border: 2px solid #dee2e6;
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 1;
            background: #f8f9fa;
            cursor: zoom-in;
            transition: transform 0.2s;
        }

        .frame-item img { width: 100%; height: 100%; object-fit: contain; }

        /* 放大状态样式 */
        .frame-item.zoomed {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(3);
            z-index: 1000;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
            cursor: zoom-out;
            width: 250px;
            height: 250px;
        }

        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 999;
        }

        .frame-number {
            position: absolute;
            bottom: 5px; right: 5px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
        }

        .progress-bar {
            width: 100%; height: 8px;
            background: #e9ecef;
            border-radius: 4px;
            overflow: hidden;
            margin-top: 15px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
        }

        .tips {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            border-radius: 8px;
            margin-top: 20px;
            color: #856404;
        }
    </style>
</head>
<body>
    <div class="overlay" id="overlay"></div>
    <div class="container">
        <div class="header">
            <h1>🎬 序列帧动画工具 (专业增强版)</h1>
            <p>视频抽帧 · 边缘泛洪抠像 · 水印智能剔除 · 放大细节检查</p>
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-title">📤 第一步：上传视频</div>
                <div class="upload-area" id="uploadArea">
                    <div style="font-size: 48px;">🎥</div>
                    <p style="font-size: 18px; font-weight: 600;">点击或拖拽视频文件到这里</p>
                    <input type="file" id="videoInput" accept="video/*">
                </div>
                <div id="videoPreview" style="margin-top: 20px; display: none;">
                    <video id="videoElement" controls style="width: 100%;"></video>
                    <div id="videoInfo" style="margin-top:10px; color:#666;"></div>
                </div>
            </div>

            <div class="section">
                <div class="section-title">⚙️ 第二步：提取帧设置</div>
                <div class="controls">
                    <div class="control-group">
                        <label>目标帧率 (FPS)</label>
                        <select id="fpsSelect">
                            <option value="8">8 FPS</option>
                            <option value="12">12 FPS</option>
                            <option value="15" selected>15 FPS</option>
                            <option value="24">24 FPS</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>帧宽度 (px)</label>
                        <input type="number" id="frameWidth" value="512">
                    </div>
                    <div class="control-group">
                        <label>帧高度 (px)</label>
                        <input type="number" id="frameHeight" value="512">
                    </div>
                </div>
                <button id="extractFramesBtn" disabled style="margin-top:20px;">🎞️ 提取视频帧</button>
                <div id="extractProgress" style="display: none;">
                    <div class="progress-bar"><div class="progress-fill" id="extractProgressFill"></div></div>
                    <p id="extractInfo" style="font-size:12px; margin-top:5px;"></p>
                </div>
            </div>

            <div class="section" id="framesSection" style="display: none;">
                <div class="section-title">🖼️ 第三步：提取帧预览 (点击图片放大)</div>
                <div class="frames-grid" id="framesGrid"></div>
            </div>

            <div class="section" id="removeBackgroundSection" style="display: none;">
                <div class="section-title">✂️ 第四步：高级抠图与水印处理</div>
                <div class="controls">
                    <div class="control-group">
                        <label>背景模式</label>
                        <select id="bgMode">
                            <option value="green">绿色背景</option>
                            <option value="white">白色背景</option>
                            <option value="black">黑色背景</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>容差阈值: <span id="thresholdValue">30</span></label>
                        <input type="range" id="threshold" min="0" max="100" value="30">
                    </div>
                    <div class="control-group">
                        <label>边缘羽化: <span id="featherValue">2</span></label>
                        <input type="range" id="feather" min="0" max="10" value="2">
                    </div>
                </div>
                <button id="removeBackgroundBtn" style="margin-top:20px;">🎨 执行智能抠图</button>
                <div id="bgRemovalProgress" style="display: none;">
                    <div class="progress-bar"><div class="progress-fill" id="bgRemovalProgressFill"></div></div>
                </div>
            </div>

            <div class="section" id="generateSection" style="display: none;">
                <div class="section-title">📦 第五步：导出 Unity 图集</div>
                <div class="controls">
                    <div class="control-group">
                        <label>每行帧数</label>
                        <input type="number" id="columns" value="8">
                    </div>
                </div>
                <div style="margin-top:20px; display:flex; gap:10px;">
                    <button id="generateSpriteSheetBtn">🎯 生成序列帧图</button>
                    <button id="downloadBtn" style="display: none; background: #28a745;">💾 下载 PNG</button>
                </div>
                <div id="resultPreview" style="margin-top:20px; display:none; text-align:center;">
                    <img id="resultImage" style="max-width:100%; border:1px solid #ccc;">
                </div>
            </div>

            <div class="tips">
                <p>💡 <b>提示：</b> 水印智能清理功能已开启。如果水印残留较多，请尝试适当调高“容差阈值”。点击上方预览图可放大检查细节。</p>
            </div>
        </div>
    </div>

    <script>
        let videoFile = null;
        let extractedFrames = [];
        let processedFrames = [];

        const videoInput = document.getElementById('videoInput');
        const videoElement = document.getElementById('videoElement');
        const overlay = document.getElementById('overlay');

        // 上传处理
        document.getElementById('uploadArea').onclick = () => videoInput.click();
        videoInput.onchange = (e) => {
            if (e.target.files.length > 0) {
                videoFile = e.target.files[0];
                videoElement.src = URL.createObjectURL(videoFile);
                document.getElementById('videoPreview').style.display = 'block';
                document.getElementById('extractFramesBtn').disabled = false;
            }
        };

        // 遮罩层关闭放大
        overlay.onclick = () => {
            document.querySelector('.frame-item.zoomed')?.classList.remove('zoomed');
            overlay.style.display = 'none';
        };

        // 1. 提取帧
        document.getElementById('extractFramesBtn').onclick = async () => {
            const fps = parseInt(document.getElementById('fpsSelect').value);
            const w = parseInt(document.getElementById('frameWidth').value);
            const h = parseInt(document.getElementById('frameHeight').value);
            
            document.getElementById('extractProgress').style.display = 'block';
            extractedFrames = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = w; canvas.height = h;

            const total = Math.floor(videoElement.duration * fps);
            for (let i = 0; i < total; i++) {
                videoElement.currentTime = i * (1 / fps);
                await new Promise(r => videoElement.onseeked = r);
                ctx.drawImage(videoElement, 0, 0, w, h);
                extractedFrames.push(canvas.toDataURL('image/png'));
                document.getElementById('extractProgressFill').style.width = ((i+1)/total)*100 + '%';
                document.getElementById('extractInfo').innerText = `正在提取: ${i+1}/${total}`;
            }
            renderFrames(extractedFrames);
            document.getElementById('framesSection').style.display = 'block';
            document.getElementById('removeBackgroundSection').style.display = 'block';
        };

        // 2. 渲染预览并绑定放大
        function renderFrames(frames, isProcessed = false) {
            const grid = document.getElementById('framesGrid');
            grid.innerHTML = '';
            frames.forEach((src, idx) => {
                const div = document.createElement('div');
                div.className = 'frame-item';
                if(isProcessed) div.style.background = 'repeating-conic-gradient(#ddd 0% 25%, white 0% 50%) 50% / 15px 15px';
                div.innerHTML = `<img src="${src}"><div class="frame-number">#${idx+1}</div>`;
                div.onclick = (e) => {
                    e.stopPropagation();
                    const isZoomed = div.classList.contains('zoomed');
                    document.querySelectorAll('.frame-item').forEach(f => f.classList.remove('zoomed'));
                    if(!isZoomed) {
                        div.classList.add('zoomed');
                        overlay.style.display = 'block';
                    } else {
                        overlay.style.display = 'none';
                    }
                };
                grid.appendChild(div);
            });
        }

        // 3. 抠图逻辑 (带水印剔除)
        document.getElementById('removeBackgroundBtn').onclick = async () => {
            const threshold = parseInt(document.getElementById('threshold').value);
            const feather = parseInt(document.getElementById('feather').value);
            const bgMode = document.getElementById('bgMode').value;
            let target = bgMode === 'white' ? [255,255,255] : (bgMode === 'black' ? [0,0,0] : [0,255,0]);

            document.getElementById('bgRemovalProgress').style.display = 'block';
            processedFrames = [];
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d');

            for (let i = 0; i < extractedFrames.length; i++) {
                const img = await new Promise(r => { const m = new Image(); m.onload = () => r(m); m.src = extractedFrames[i]; });
                canvas.width = img.width; canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                let imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                let data = imageData.data;
                const w = canvas.width, h = canvas.height;

                // 泛洪抠图
                const visited = new Uint8Array(w * h);
                const queue = new Int32Array(w * h * 2);
                let head = 0, tail = 0;

                const check = (x, y) => {
                    const idx = (y * w + x) * 4;
                    return Math.hypot(data[idx]-target[0], data[idx+1]-target[1], data[idx+2]-target[2]);
                };

                // 边缘种子点
                for(let x=0; x<w; x++) { if(check(x,0) < threshold+20) { queue[tail++]=x; queue[tail++]=0; visited[x]=1; } }
                
                while(head < tail) {
                    const cx = queue[head++], cy = queue[head++];
                    const idx = (cy * w + cx) * 4;
                    const diff = check(cx, cy);
                    if(diff < threshold) data[idx+3] = 0;
                    else if(diff < threshold + feather*8) data[idx+3] = ((diff-threshold)/(feather*8)) * 255;

                    [[0,1],[0,-1],[1,0],[-1,0]].forEach(([dx,dy]) => {
                        const nx = cx+dx, ny = cy+dy;
                        if(nx>=0 && nx<w && ny>=0 && ny<h && !visited[ny*w+nx] && check(nx,ny) < threshold+feather*10) {
                            visited[ny*w+nx]=1; queue[tail++]=nx; queue[tail++]=ny;
                        }
                    });
                }

                // 右下角水印深度清理 (保护角色前提下处理 15% 区域)
                const wmX = Math.floor(w * 0.8), wmY = Math.floor(h * 0.85);
                for(let y=wmY; y<h; y++) {
                    for(let x=wmX; x<w; x++) {
                        const idx = (y*w+x)*4;
                        if(check(x,y) < threshold + 45) data[idx+3] *= 0.2; 
                    }
                }

                ctx.putImageData(imageData, 0, 0);
                processedFrames.push(canvas.toDataURL('image/png'));
                document.getElementById('bgRemovalProgressFill').style.width = ((i+1)/extractedFrames.length)*100 + '%';
            }
            renderFrames(processedFrames, true);
            document.getElementById('generateSection').style.display = 'block';
        };

        // 4. 生成精灵图
        document.getElementById('generateSpriteSheetBtn').onclick = () => {
            const cols = parseInt(document.getElementById('columns').value);
            const frames = processedFrames.length > 0 ? processedFrames : extractedFrames;
            const rows = Math.ceil(frames.length / cols);
            const canvas = document.createElement('canvas');
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width * cols; canvas.height = img.height * rows;
                const ctx = canvas.getContext('2d');
                let count = 0;
                frames.forEach((src, i) => {
                    const f = new Image();
                    f.onload = () => {
                        ctx.drawImage(f, (i%cols)*img.width, Math.floor(i/cols)*img.height);
                        if(++count === frames.length) {
                            const res = canvas.toDataURL('image/png');
                            document.getElementById('resultImage').src = res;
                            document.getElementById('resultPreview').style.display = 'block';
                            const dl = document.getElementById('downloadBtn');
                            dl.style.display = 'inline-block';
                            dl.onclick = () => { const a = document.createElement('a'); a.download="sprite.png"; a.href=res; a.click(); };
                        }
                    };
                    f.src = src;
                });
            };
            img.src = frames[0];
        };

        // UI 交互
        document.getElementById('threshold').oninput = (e) => document.getElementById('thresholdValue').innerText = e.target.value;
        document.getElementById('feather').oninput = (e) => document.getElementById('featherValue').innerText = e.target.value;
    </script>
</body>
</html>
