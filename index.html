<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>序列帧动画工具 Pro - 增加水印抹除与缩放预览</title>
    <style>
        /* ... 保留之前的样式并新增 ... */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 30px; text-align: center; }
        .main-content { padding: 30px; }
        .section { margin-bottom: 30px; padding: 25px; background: #f8f9fa; border-radius: 12px; border: 2px dashed #dee2e6; }
        .section-title { font-size: 20px; font-weight: 600; color: #495057; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .section-title::before { content: ''; width: 4px; height: 24px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 2px; }
        
        /* 上传区域 */
        .upload-area { border: 3px dashed #667eea; border-radius: 12px; padding: 40px; text-align: center; background: white; cursor: pointer; transition: all 0.3s; }
        .upload-area:hover { border-color: #764ba2; background: #f8f9ff; }
        input[type="file"] { display: none; }

        /* 控件 */
        .controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .control-group { display: flex; flex-direction: column; gap: 8px; }
        label { font-weight: 600; color: #495057; font-size: 14px; }
        input[type="number"], input[type="range"], select { padding: 10px; border: 2px solid #dee2e6; border-radius: 8px; font-size: 14px; }
        
        /* 按钮 */
        button { padding: 12px 25px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #adb5bd; cursor: not-allowed; }
        .btn-danger { background: linear-gradient(135deg, #ff416c, #ff4b2b); }

        /* 帧预览与放大 */
        .frames-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
        .frame-item { position: relative; border: 2px solid #dee2e6; border-radius: 8px; overflow: hidden; background: #eee; cursor: zoom-in; transition: 0.2s; }
        .frame-item:hover { transform: scale(1.05); border-color: #667eea; }
        .frame-item img { width: 100%; display: block; }

        /* 放大模态框 */
        .modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; cursor: zoom-out; }
        .modal img { max-width: 90%; max-height: 90%; box-shadow: 0 0 30px rgba(0,0,0,0.5); border-radius: 8px; }

        /* 水印区域选择器 */
        .watermark-mask-hint { font-size: 12px; color: #e44d26; margin-top: 5px; }
        .progress-bar { width: 100%; height: 8px; background: #e9ecef; border-radius: 4px; overflow: hidden; margin-top: 15px; display: none; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #667eea, #764ba2); width: 0%; transition: 0.3s; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎬 序列帧动画工具 Pro</h1>
            <p>集成：视频抽帧 · 边缘抠像 · <strong>水印抹除</strong> · <strong>点击放大</strong></p>
        </div>

        <div class="main-content">
            <div class="section">
                <div class="section-title">📤 第一步：上传视频</div>
                <div class="upload-area" id="uploadArea">
                    <p style="font-size: 18px; font-weight: 600;">点击或拖拽视频到这里</p>
                    <input type="file" id="videoInput" accept="video/*">
                </div>
                <video id="videoElement" style="display:none;"></video>
            </div>

            <div class="section">
                <div class="section-title">⚙️ 第二步：处理参数</div>
                <div class="controls">
                    <div class="control-group">
                        <label>抽帧 FPS</label>
                        <select id="fpsSelect">
                            <option value="12">12 FPS</option>
                            <option value="15" selected>15 FPS</option>
                            <option value="24">24 FPS</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <label>抠图容差 (边缘泛洪)</label>
                        <input type="range" id="threshold" min="0" max="100" value="30">
                    </div>
                    <div class="control-group">
                        <label>水印抹除 (底部高度 %)</label>
                        <input type="number" id="wmBottom" value="10" min="0" max="50">
                        <p class="watermark-mask-hint">建议值：塔啦啦水印通常在底部 8-12%</p>
                    </div>
                </div>
                
                <div style="margin-top: 20px; display: flex; gap: 10px;">
                    <button id="processBtn" disabled>🚀 开始处理 (全流程)</button>
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <p id="statusText" style="font-size: 14px; color: #666; margin-top: 10px;"></p>
            </div>

            <div class="section" id="previewSection" style="display:none;">
                <div class="section-title">🖼️ 第三步：帧预览 (点击可放大)</div>
                <div class="frames-grid" id="framesGrid"></div>
                
                <div style="margin-top: 30px;">
                    <button id="downloadSpriteBtn">📦 生成并下载 Unity 精灵图集</button>
                </div>
            </div>
        </div>
    </div>

    <div class="modal" id="imageModal">
        <img id="modalImg" src="">
    </div>

    <script>
        const videoInput = document.getElementById('videoInput');
        const videoElement = document.getElementById('videoElement');
        const processBtn = document.getElementById('processBtn');
        const framesGrid = document.getElementById('framesGrid');
        const progressBar = document.getElementById('progressBar');
        const progressFill = document.getElementById('progressFill');
        const statusText = document.getElementById('statusText');
        const imageModal = document.getElementById('imageModal');
        const modalImg = document.getElementById('modalImg');

        let framesData = []; // 存储处理后的帧

        // 1. 处理上传
        document.getElementById('uploadArea').onclick = () => videoInput.click();
        videoInput.onchange = (e) => {
            if (e.target.files[0]) {
                videoElement.src = URL.createObjectURL(e.target.files[0]);
                processBtn.disabled = false;
                statusText.innerText = "视频已就绪，请点击开始处理。";
            }
        };

        // 2. 核心处理流程
        processBtn.onclick = async () => {
            framesData = [];
            framesGrid.innerHTML = '';
            processBtn.disabled = true;
            progressBar.style.display = 'block';

            const fps = parseInt(document.getElementById('fpsSelect').value);
            const threshold = parseInt(document.getElementById('threshold').value);
            const wmBottomPercent = parseInt(document.getElementById('wmBottom').value);
            
            const duration = videoElement.duration;
            const totalFrames = Math.floor(duration * fps);
            
            // 创建处理 Canvas
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = 512; // 导出标准尺寸
            canvas.height = 512;

            for (let i = 0; i < totalFrames; i++) {
                videoElement.currentTime = i / fps;
                await new Promise(r => videoElement.onseeked = r);

                // A. 绘制原始帧
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(videoElement, 0, 0, canvas.width, canvas.height);

                // B. 执行水印抹除 (Watermark Removal)
                // 原理：将底部指定区域直接设为透明或填充背景色
                if (wmBottomPercent > 0) {
                    const wmHeight = (canvas.height * wmBottomPercent) / 100;
                    ctx.clearRect(0, canvas.height - wmHeight, canvas.width, wmHeight);
                }

                // C. 执行抠图算法 (Background Removal)
                const imgData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                removeBackground(imgData, threshold);
                ctx.putImageData(imgData, 0, 0);

                // D. 存储并展示
                const dataUrl = canvas.toDataURL('image/png');
                framesData.push(dataUrl);
                addFrameToGrid(dataUrl, i);

                // 更新进度
                const p = ((i + 1) / totalFrames) * 100;
                progressFill.style.width = p + '%';
                statusText.innerText = `处理中... ${Math.round(p)}%`;
            }

            processBtn.disabled = false;
            statusText.innerText = "处理完成！点击图片可查看细节。";
            document.getElementById('previewSection').style.display = 'block';
        };

        // 3. 抠图算法（基于左上角采样泛洪）
        function removeBackground(imgData, threshold) {
            const data = imgData.data;
            // 默认采样左上角像素作为背景色
            const targetR = data[0], targetG = data[1], targetB = data[2];

            for (let i = 0; i < data.length; i += 4) {
                const r = data[i], g = data[i+1], b = data[i+2];
                const diff = Math.sqrt(
                    Math.pow(r - targetR, 2) + 
                    Math.pow(g - targetG, 2) + 
                    Math.pow(b - targetB, 2)
                );
                if (diff < threshold) {
                    data[i+3] = 0; // 设为透明
                }
            }
        }

        // 4. UI: 添加帧并支持放大
        function addFrameToGrid(src, index) {
            const div = document.createElement('div');
            div.className = 'frame-item';
            div.innerHTML = `<img src="${src}" title="点击放大第 ${index+1} 帧">`;
            div.onclick = () => {
                modalImg.src = src;
                imageModal.style.display = 'flex';
            };
            framesGrid.appendChild(div);
        }

        // 关闭模态框
        imageModal.onclick = () => imageModal.style.display = 'none';

        // 5. 生成图集 (Sprite Sheet)
        document.getElementById('downloadSpriteBtn').onclick = () => {
            const columns = 8;
            const rows = Math.ceil(framesData.length / columns);
            const canvas = document.createElement('canvas');
            canvas.width = columns * 512;
            canvas.height = rows * 512;
            const ctx = canvas.getContext('2d');

            framesData.forEach((src, i) => {
                const img = new Image();
                img.src = src;
                img.onload = () => {
                    const x = (i % columns) * 512;
                    const y = Math.floor(i / columns) * 512;
                    ctx.drawImage(img, x, y);
                    if (i === framesData.length - 1) {
                        const link = document.createElement('a');
                        link.download = "Unity_SpriteSheet.png";
                        link.href = canvas.toDataURL();
                        link.click();
                    }
                };
            });
        };
    </script>
</body>
</html>
